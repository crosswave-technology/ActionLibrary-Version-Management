name: Promote Version
permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - '.github/**'
      - '**/docs/**'
      - '**/VERSION'

env:
  AUTO_MERGE: "true"
  MERGE_METHOD: "merge"
  MERGE_ADMIN: "false"
  LOG_SOURCE_RANGE: "latest"

jobs:
  discover:
    name: Discover Version Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      pr_number: ${{ steps.lookup.outputs.pr_number }}
    steps:
      - name: Generate GitHub App Token
        id: app_token
        shell: bash
        env:
          APP_ID: ${{ secrets.NEXUS_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.NEXUS_AUTOMATION_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.NEXUS_AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_ID:-}" ] || [ -z "${APP_INSTALLATION_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing app credentials (NEXUS_APP_ID, NEXUS_AUTOMATION_APP_INSTALLATION_ID, NEXUS_AUTOMATION_APP_PRIVATE_KEY)." >&2
            exit 1
          fi
          pem_file=$(mktemp)
          trap 'rm -f "$pem_file"' EXIT
          printf '%s' "$APP_PRIVATE_KEY" > "$pem_file"
          iat=$(date +%s)
          exp=$((iat + 540))
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          unsigned="$header.$payload"
          signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          jwt="$unsigned.$signature"
          token=$(curl -sS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${APP_INSTALLATION_ID}/access_tokens" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to generate installation token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "GH_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Discover PR Via Commit
        uses: actions/github-script@v6
        id: lookup
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const prNumber =
              context.payload.pull_request?.number ||
              context.payload.workflow_run?.pull_requests?.[0]?.number;
            if (prNumber) {
              core.setOutput('pr_number', prNumber);
              return;
            }
            const sha = context.payload.workflow_run?.head_sha || context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha
            });
            if (prs.length === 0) {
              core.setFailed(`No PR found for commit ${sha}`);
            } else {
              core.setOutput('pr_number', prs[0].number);
            }

      - name: Discover VERSION files
        id: targets
        shell: bash
        env:
          PR_NUMBER: ${{ steps.lookup.outputs.pr_number }}
        run: |
          set -euo pipefail
          version_files=()
          if [ -f "VERSION" ]; then
            version_files=("VERSION")
          else
            if [ -z "${PR_NUMBER:-}" ]; then
              echo "No PR number available to discover VERSION files."
              exit 1
            fi
            mapfile -t changed_files < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')
            for file in "${changed_files[@]}"; do
              [ -z "$file" ] && continue
              dir=$(dirname "$file")
              while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
                if [ -f "$dir/VERSION" ]; then
                  version_files+=("$dir/VERSION")
                fi
                dir=$(dirname "$dir")
              done
            done
          fi

          if [ "${#version_files[@]}" -eq 0 ]; then
            echo "No VERSION files found."
            exit 1
          fi

          mapfile -t version_files < <(printf '%s\n' "${version_files[@]}" | awk 'NF' | sort -u)

          json='[]'
          for vf in "${version_files[@]}"; do
            dir=$(dirname "$vf")
            if [ "$dir" = "." ]; then
              feature_slug="root"
              file_slug="root-version"
            else
              feature_slug=$(printf '%s' "$dir" | tr '[:upper:]' '[:lower:]' | tr '/\\' '-' | tr -c 'a-z0-9._-' '-' | tr -s '-')
              feature_slug=${feature_slug#-}
              feature_slug=${feature_slug%-}
              if [ -z "$feature_slug" ]; then
                feature_slug="feature"
              fi
              file_slug=$(printf '%s' "$vf" | tr '[:upper:]' '[:lower:]' | tr '/\\' '-' | tr -c 'a-z0-9._-' '-' | tr -s '-')
              file_slug=${file_slug#-}
              file_slug=${file_slug%-}
              if [ -z "$file_slug" ]; then
                file_slug="version-file"
              fi
            fi
            json=$(jq --arg vf "$vf" --arg feature "$feature_slug" --arg file "$file_slug" '. + [{version_file:$vf, feature_slug:$feature, file_slug:$file}]' <<< "$json")
          done

          {
            echo "matrix<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  promote:
    name: Promote Version
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Generate GitHub App Token
        id: app_token
        shell: bash
        env:
          APP_ID: ${{ secrets.NEXUS_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.NEXUS_AUTOMATION_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.NEXUS_AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_ID:-}" ] || [ -z "${APP_INSTALLATION_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing app credentials (NEXUS_APP_ID, NEXUS_AUTOMATION_APP_INSTALLATION_ID, NEXUS_AUTOMATION_APP_PRIVATE_KEY)." >&2
            exit 1
          fi
          pem_file=$(mktemp)
          trap 'rm -f "$pem_file"' EXIT
          printf '%s' "$APP_PRIVATE_KEY" > "$pem_file"
          iat=$(date +%s)
          exp=$((iat + 540))
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          unsigned="$header.$payload"
          signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          jwt="$unsigned.$signature"
          token=$(curl -sS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${APP_INSTALLATION_ID}/access_tokens" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to generate installation token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "GH_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Check Log Management Support
        id: log_management
        shell: bash
        run: |
          if [ -f ".github/workflows/git-action_log-management.yml" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Automation Branch
        id: branch
        shell: bash
        run: |
          base_branch="${GITHUB_REF_NAME}"
          suffix="run-${GITHUB_RUN_ID}"
          if [ -n "${{ needs.discover.outputs.pr_number }}" ]; then
            suffix="pr-${{ needs.discover.outputs.pr_number }}-run-${GITHUB_RUN_ID}"
          fi
          feature="${{ matrix.feature_slug }}"
          file_slug="${{ matrix.file_slug }}"
          branch="automation/version/${feature}/${suffix}-${file_slug}"
          git checkout -b "$branch"
          echo "base_branch=$base_branch" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Version Management
        id: promote_version
        uses: crosswave-technology/ActionLibrary-Version-Management@master
        with:
          pr_number: ${{ needs.discover.outputs.pr_number }}
          version_file: ${{ matrix.version_file }}
          push_changes: false

      - name: Create Logs
        uses: crosswave-technology/ActionLibrary-Create-Log@master
        if: ${{ steps.log_management.outputs.enabled == 'true' && needs.discover.outputs.pr_number != '' }}
        with:
          pr_number: ${{ needs.discover.outputs.pr_number }}
          github_token: ${{ steps.app_token.outputs.token }}
          version_file: ${{ matrix.version_file }}

      - name: Generate ChangeLog
        uses: crosswave-technology/ActionLibrary-Generate-Changelog@master
        if: ${{ steps.log_management.outputs.enabled == 'true' && needs.discover.outputs.pr_number != '' }}
        with:
          pr_number: ${{ needs.discover.outputs.pr_number }}
          github_token: ${{ steps.app_token.outputs.token }}
          source_range: ${{ env.LOG_SOURCE_RANGE }}
          version_file: ${{ matrix.version_file }}
          push_changes: false

      - name: Check For Automation Changes
        id: changes
        shell: bash
        run: |
          base_branch="${{ steps.branch.outputs.base_branch }}"
          git fetch origin "$base_branch"
          count=$(git rev-list --count "origin/${base_branch}..HEAD")
          if [ "$count" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open And Merge PR
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        shell: bash
        run: |
          branch="${{ steps.branch.outputs.branch }}"
          base_branch="${{ steps.branch.outputs.base_branch }}"
          git push -u origin "$branch"

          title="ci: promote version"
          body="Automated version promotion for PR #${{ needs.discover.outputs.pr_number }}."
          repo_owner="${GITHUB_REPOSITORY_OWNER:-${GITHUB_REPOSITORY%%/*}}"
          pr_output=$(gh pr create --base "$base_branch" --head "$branch" --title "$title" --body "$body")
          pr_url=$(printf '%s\n' "$pr_output" | awk 'NF{line=$0} END{print line}')
          pr_number="${pr_url##*/}"
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            pr_number=$(gh api "repos/${GITHUB_REPOSITORY}/pulls?head=${repo_owner}:${branch}" --jq '.[0].number')
          fi
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "Failed to determine PR number for ${branch}." >&2
            exit 1
          fi

          if [ "${AUTO_MERGE}" = "true" ]; then
            merge_args="--${MERGE_METHOD} --auto"
            if [ "${MERGE_ADMIN}" = "true" ]; then
              merge_args="$merge_args --admin"
            fi
            gh pr merge "$pr_number" $merge_args
          fi
