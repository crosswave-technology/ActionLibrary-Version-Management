name: "Pre-Check: Secret Scan"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="${GITLEAKS_VERSION}"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -sSLo gitleaks.tar.gz "$url"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run gitleaks
        id: gitleaks
        shell: bash
        run: |
          set -euo pipefail
          report_file="$RUNNER_TEMP/gitleaks-report.json"
          exit_code=0

          # Scan commits in this PR only (base..head)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            gitleaks detect \
              --source="." \
              --log-opts="${base}..${head}" \
              --report-format=json \
              --report-path="$report_file" \
              --redact \
              --no-git=false \
              --exit-code=1 \
              2>/dev/null || exit_code=$?
          else
            # workflow_dispatch: scan entire working tree
            gitleaks detect \
              --source="." \
              --report-format=json \
              --report-path="$report_file" \
              --redact \
              --exit-code=1 \
              2>/dev/null || exit_code=$?
          fi

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"

          if [ "$exit_code" -eq 0 ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse findings
        id: findings
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report_file="${{ steps.gitleaks.outputs.report_file }}"
          count=0
          summary_table=""

          if [ -f "$report_file" ] && [ -s "$report_file" ]; then
            count=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('$report_file','utf8'));
              console.log(Array.isArray(r) ? r.length : 0);
            ")
            summary_table=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('$report_file','utf8'));
              if (!Array.isArray(r) || r.length === 0) { console.log('No findings.'); process.exit(0); }
              const rows = r.map(f => \`| \${f.RuleID || 'unknown'} | \${f.File || ''} | \${f.StartLine || ''} | \${(f.Secret||'').substring(0,20).replace(/./g,'*')}... |\`);
              console.log('| Rule | File | Line | Secret (redacted) |');
              console.log('|------|------|------|-------------------|');
              rows.slice(0, 20).forEach(r => console.log(r));
              if (r.length > 20) console.log(\`... and \${r.length - 20} more findings\`);
            " 2>/dev/null || echo "Error parsing report")
          fi

          echo "count=$count" >> "$GITHUB_OUTPUT"
          {
            echo "summary_table<<__EOF__"
            echo "$summary_table"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Step summary
        if: always()
        shell: bash
        run: |
          status="${{ steps.gitleaks.outputs.status }}"
          count="${{ steps.findings.outputs.count }}"

          if [ "$status" = "pass" ]; then
            header=":white_check_mark: Secret scan — passed (required)"
          else
            header=":x: Secret scan — **FAILED** — ${count} finding(s) detected (required)"
          fi

          {
            echo "### Secret Scan (gitleaks)"
            echo ""
            echo "$header"
            echo ""
            if [ "$status" != "pass" ]; then
              echo "${{ steps.findings.outputs.summary_table }}"
              echo ""
              echo "> Secrets detected in this PR. All findings must be resolved before merge."
              echo "> If a finding is a false positive, add a \`# gitleaks:allow\` comment on that line"
              echo "> or create a \`.gitleaks.toml\` allowlist entry."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number }}"
          comment_marker="<!-- gitleaks-precheck -->"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          status="${{ steps.gitleaks.outputs.status }}"
          count="${{ steps.findings.outputs.count }}"
          table="${{ steps.findings.outputs.summary_table }}"

          if [ "$status" = "pass" ]; then
            status_line=":white_check_mark: Secret scan — passed (required)"
            body_extra=""
          else
            status_line=":x: Secret scan — **${count} finding(s) detected** (required)"
            body_extra="$(cat <<'INNER'

          > All secrets must be removed from the branch history before this PR can merge.
          > Use \`git filter-repo\` or BFG to purge committed secrets.
          > For false positives, add \`# gitleaks:allow\` inline or create a \`.gitleaks.toml\` allowlist entry.

          INNER
          )"
          fi

          body="${comment_marker}
          ### Secret Scan — gitleaks (automated)

          ${status_line}

          Run: [${GITHUB_RUN_ID}](${run_url})
          ${body_extra}
          $([ "$status" != "pass" ] && echo "$table" || true)"

          payload=$(jq -n --arg body "$body" '{body:$body}')
          comment_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
            --paginate --jq ".[] | select(.body | contains(\"${comment_marker}\")) | .id" | head -n 1)

          if [ -n "$comment_id" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -X PATCH --input - <<<"$payload" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
              -X POST --input - <<<"$payload" >/dev/null
          fi

          if [ "$status" != "pass" ]; then
            echo "::error::Secret scan detected ${count} finding(s). Review the PR comment for details."
            exit 1
          fi
