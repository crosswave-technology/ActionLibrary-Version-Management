name: Create Release
run-name: >-
  ${{ startsWith(github.ref, 'refs/tags/')
      && format('Release: {0}', github.ref_name)
      || (github.event.head_commit && github.event.head_commit.added && github.event.head_commit.added[0])
      && format('Release: {0}', github.event.head_commit.added[0])
      || format('Release: {0}', github.ref_name) }}
permissions:
  actions: write
  id-token: write
  checks: write
  contents: write
  packages: read
  pull-requests: write

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/logs/*.md'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-hotfix.[0-9]+'
      - '*-v[0-9]+.[0-9]+.[0-9]+-hotfix.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - '*-v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'

env:
  ARTIFACTS_ASSETS_PATH: "artifacts/assets"
  package_path: "src"

jobs:
  detect-release:
    name: Detect Release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      release_version: ${{ steps.detect.outputs.release_version }}
    steps:
      - name: Generate GitHub App Token
        id: app_token
        shell: bash
        env:
          APP_ID: ${{ secrets.NEXUS_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.NEXUS_AUTOMATION_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.NEXUS_AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_ID:-}" ] || [ -z "${APP_INSTALLATION_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing app credentials (NEXUS_APP_ID, NEXUS_AUTOMATION_APP_INSTALLATION_ID, NEXUS_AUTOMATION_APP_PRIVATE_KEY)." >&2
            exit 1
          fi
          pem_file=$(mktemp)
          trap 'rm -f "$pem_file"' EXIT
          printf '%s' "$APP_PRIVATE_KEY" > "$pem_file"
          iat=$(date +%s)
          exp=$((iat + 540))
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          unsigned="$header.$payload"
          signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          jwt="$unsigned.$signature"
          token=$(curl -sS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${APP_INSTALLATION_ID}/access_tokens" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to generate installation token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "GH_TOKEN=$token" >> "$GITHUB_ENV"
          echo "GITHUB_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      - name: Detect Release Trigger
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_version="${GITHUB_REF_NAME}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
            echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="${after}^"
          fi

          mapfile -t log_files < <(git diff --name-status "$before" "$after" | awk '$1 == "A" {print $2}' | grep -E '(^|/)(logs)/[^/]+\.md$' || true)

          if [ "${#log_files[@]}" -eq 0 ]; then
            echo "No new log files added; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "release_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${#log_files[@]}" -gt 1 ]; then
            echo "Multiple log files added; release would be ambiguous."
            printf ' - %s\n' "${log_files[@]}"
            exit 1
          fi

          log_file="${log_files[0]}"
          version_value=$(basename "$log_file" .md)
          if [ -z "$version_value" ]; then
            echo "Log file has no version name: $log_file" >&2
            exit 1
          fi

          logs_dir=$(dirname "$log_file")
          if [ "$logs_dir" = "logs" ] || [ "$logs_dir" = "./logs" ]; then
            release_version="$version_value"
          else
            feature_dir=$(dirname "$logs_dir")
            feature_slug=$(printf '%s' "$feature_dir" | tr '[:upper:]' '[:lower:]' | tr '/\\' '-' | tr -c 'a-z0-9._-' '-' | tr -s '-')
            feature_slug=${feature_slug#-}
            feature_slug=${feature_slug%-}
            if [ -z "$feature_slug" ]; then
              feature_slug="feature"
            fi
            release_version="${feature_slug}-${version_value}"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

  create-package:
    name: Create Package
    runs-on: ubuntu-latest
    needs:
      - detect-release
    if: ${{ needs.detect-release.outputs.should_release == 'true' }}
    outputs:
      release-version: ${{ steps.release_meta.outputs.release_version }}
    steps:
      - name: Generate GitHub App Token
        id: app_token
        shell: bash
        env:
          APP_ID: ${{ secrets.NEXUS_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.NEXUS_AUTOMATION_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.NEXUS_AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_ID:-}" ] || [ -z "${APP_INSTALLATION_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing app credentials (NEXUS_APP_ID, NEXUS_AUTOMATION_APP_INSTALLATION_ID, NEXUS_AUTOMATION_APP_PRIVATE_KEY)." >&2
            exit 1
          fi
          pem_file=$(mktemp)
          trap 'rm -f "$pem_file"' EXIT
          printf '%s' "$APP_PRIVATE_KEY" > "$pem_file"
          iat=$(date +%s)
          exp=$((iat + 540))
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          unsigned="$header.$payload"
          signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          jwt="$unsigned.$signature"
          token=$(curl -sS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${APP_INSTALLATION_ID}/access_tokens" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to generate installation token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "GH_TOKEN=$token" >> "$GITHUB_ENV"
          echo "GITHUB_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Set Release Metadata
        id: release_meta
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.detect-release.outputs.release_version }}
        run: |
          set -euo pipefail
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Create Package
        uses: crosswave-technology/ActionLibrary-Create-Package@master
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          RELEASE_VERSION: ${{ needs.detect-release.outputs.release_version }}
        with:
          package_path: "${{ env.package_path }}"
          artifacts_path: "${{ env.ARTIFACTS_ASSETS_PATH }}"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - detect-release
      - create-package
    if: ${{ needs.detect-release.outputs.should_release == 'true' }}
    steps:
      - name: Generate GitHub App Token
        id: app_token
        shell: bash
        env:
          APP_ID: ${{ secrets.NEXUS_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.NEXUS_AUTOMATION_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.NEXUS_AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_ID:-}" ] || [ -z "${APP_INSTALLATION_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing app credentials (NEXUS_APP_ID, NEXUS_AUTOMATION_APP_INSTALLATION_ID, NEXUS_AUTOMATION_APP_PRIVATE_KEY)." >&2
            exit 1
          fi
          pem_file=$(mktemp)
          trap 'rm -f "$pem_file"' EXIT
          printf '%s' "$APP_PRIVATE_KEY" > "$pem_file"
          iat=$(date +%s)
          exp=$((iat + 540))
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          unsigned="$header.$payload"
          signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          jwt="$unsigned.$signature"
          token=$(curl -sS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${APP_INSTALLATION_ID}/access_tokens" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Failed to generate installation token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "GH_TOKEN=$token" >> "$GITHUB_ENV"
          echo "GITHUB_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Create Release
        uses: crosswave-technology/ActionLibrary-Create-Release@master
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        with:
          release_version: ${{ needs.detect-release.outputs.release_version }}
          artifacts_path: "${{ env.ARTIFACTS_ASSETS_PATH }}"

  upload-release:
    name: Upload Package to S3
    runs-on: ubuntu-latest
    needs:
      - detect-release
      - create-package
    if: ${{ needs.detect-release.outputs.should_release == 'true' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        id: download-artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build Artifacts
          path: "${{ env.ARTIFACTS_ASSETS_PATH }}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_PRIMARY_REGION }}

      - name: Upload to S3
        uses: crosswave-technology/ActionLibrary-S3-Upload@master
        with:
          upload_from_path: "${{ env.ARTIFACTS_ASSETS_PATH }}/package.zip"
          s3_bucket: 'tlog-utilicore-artifacts'
          upload_to_path: "packages/${{ github.event.repository.name }}/${{ needs.detect-release.outputs.release_version }}/"
