name: Create Release
run-name: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref, 'alpha') && 'Create Alpha Release' || startsWith(github.ref, 'refs/tags/') && contains(github.ref, 'hotfix') && 'Create HotFix Release' || github.ref_name == 'main' && 'Create Main Release' || 'Default Release' }}
permissions:
  actions: write
  id-token: write
  checks: write
  contents: write
  packages: read
  pull-requests: write
  
on:
  workflow_run:
    workflows:
      - Promote Version
    types:
      - completed
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-hotfix.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'

env:
  ARTIFACTS_ASSETS_PATH: "artifacts/assets"
  package_path: "src"
  GH_TOKEN: ${{ github.token }}

jobs:
  create-package:
    name: Create Package
    if: ${{ github.event.workflow_run.conclusion == 'success' || (startsWith(github.ref, 'refs/tags/')) && ((contains(github.ref, 'hotfix')) || (contains(github.ref, 'alpha'))) }}
    runs-on: ubuntu-latest
    steps:
      
      - name: Create Package
        uses: crosswave-technology/ActionLibrary-Create-Package@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          package_path: "${{ env.package_path }}"
          artifacts_path: "${{ env.ARTIFACTS_ASSETS_PATH }}"

    outputs:
      release-version: ${{ env.RELEASE_VERSION }}
  
  create-release:
    name: Create Release
    if: ${{ github.event.workflow_run.conclusion == 'success' || (startsWith(github.ref, 'refs/tags/')) && ((contains(github.ref, 'hotfix')) || (contains(github.ref, 'alpha'))) }}
    runs-on: ubuntu-latest
    needs:
      - create-package
    steps:

      - name: Create Release
        uses: crosswave-technology/ActionLibrary-Create-Release@master
        with:
          release_version: ${{ needs.create-package.outputs.release-version }}
          artifacts_path: "${{ env.ARTIFACTS_ASSETS_PATH }}"

  upload-release:
    name: Upload Package to S3
    if: ${{ github.event.workflow_run.conclusion == 'success' || (startsWith(github.ref, 'refs/tags/')) && ((contains(github.ref, 'hotfix')) || (contains(github.ref, 'alpha'))) }}
    runs-on: ubuntu-latest
    needs:
      - create-package
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download Build Artifacts
        id: download-artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build Artifacts
          path: "${{ env.ARTIFACTS_ASSETS_PATH }}"
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_PRIMARY_REGION }}
      
      - name: Upload to S3
        uses: crosswave-technology/ActionLibrary-S3-Upload@master
        with:
          upload_from_path: "${{ env.ARTIFACTS_ASSETS_PATH }}/package.zip"
          s3_bucket: 'tlog-utilicore-artifacts'
          upload_to_path: "packages/${{ github.event.repository.name }}/${{ needs.create-package.outputs.release-version }}/"