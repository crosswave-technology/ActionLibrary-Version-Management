name: Version Management
description: 'Promote version based on PR labels or commit messages (uses GitHub repo variable)'

permissions:
  actions: write
  contents: write
  pull-requests: read

inputs:
  pr_number:
    description: 'Pull Request Number'
    required: false

runs:
  using: "composite"
  steps:

    - name: Ensure GitHub CLI is authenticated
      shell: bash
      run: |
        echo "Authenticating GitHub CLI..."
        gh auth status || gh auth login --with-token <<< "$GITHUB_TOKEN"

    - name: Acquire and Validate Current VERSION Variable
      id: current_version
      shell: bash
      run: |
        set -e
        echo "🔍 Checking for existing GitHub variable: VERSION"
        version_output=$(gh api /repos/${{ github.repository }}/actions/variables/VERSION 2>/dev/null || echo "")
        if [[ -z "$version_output" ]]; then
          echo "❌ VERSION variable not found in the repository!"
          echo "Please create it manually or as part of the repo bootstrap process."
          exit 1
        fi
        current_version=$(echo "$version_output" | jq -r '.value')
        echo "✅ Found VERSION: $current_version"
        echo "current_version=$current_version" >> $GITHUB_ENV

    - name: Determine Promotion Type
      id: promotion_type
      shell: bash
      run: |
        set -e
        echo "Determine version promotion type ..."
        promotion_type=""
        if [[ -n "${{ inputs.pr_number }}" ]]; then
          labels=$(gh pr view ${{ inputs.pr_number }} --json labels --jq '.labels[].name')
          for label in $labels; do
            case "$label" in
              major-release) promotion_type="major"; break ;;
              minor-release) promotion_type="minor"; break ;;
              patch-release) promotion_type="patch"; break ;;
            esac
          done
          if [[ -z "$promotion_type" ]]; then
            title=$(gh pr view ${{ inputs.pr_number }} --json title --jq '.title')
            if [[ "$title" =~ major-release ]]; then promotion_type="major"; fi
            if [[ "$title" =~ minor-release ]]; then promotion_type="minor"; fi
            if [[ "$title" =~ patch-release ]]; then promotion_type="patch"; fi
          fi
        fi

        if [[ -z "$promotion_type" ]]; then
          msg="${{ github.event.head_commit.message }}"
          if [[ "$msg" =~ major-release ]]; then promotion_type="major"; fi
          if [[ "$msg" =~ minor-release ]]; then promotion_type="minor"; fi
          if [[ "$msg" =~ patch-release ]]; then promotion_type="patch"; fi
        fi

        if [[ -z "$promotion_type" ]]; then
          echo "❌ No valid promotion type found (major-release, minor-release, patch-release)"
          exit 1
        fi

        echo "Promotion type: $promotion_type"
        echo "promotion_type=$promotion_type" >> $GITHUB_ENV

    - name: Promote Version
      id: promote_version
      shell: bash
      run: |
        set -e
        IFS='.' read -r major minor patch <<< "${{ env.current_version }}"
        if [ "${{ env.promotion_type }}" == "major" ]; then
          major=$((major + 1))
          minor=0
          patch=0
        elif [ "${{ env.promotion_type }}" == "minor" ]; then
          minor=$((minor + 1))
          patch=0
        else
          patch=$((patch + 1))
        fi
        new_version="$major.$minor.$patch"
        echo "✅ New version: $new_version"
        echo "new_version=$new_version" >> $GITHUB_ENV

    - name: Update GitHub Repository Variable
      shell: bash
      run: |
        set -e
        gh variable set VERSION --repo ${{ github.repository }} --body "${{ env.new_version }}"
        echo "✅ New version Set!"
